  reasoning: >-
    This paper studies conditioned taste aversion (CTA) memory retrieval in mice,
    examining cortico-amygdala interactions that determine which insular cortical neurons
    participate in taste memory. The study uses c-Fos immunohistochemistry to identify
    activated neurons, electrophysiology, and chemogenetic (DREADD) manipulation of
    basolateral amygdala activity. The methods are immunohistochemistry-based and
    electrophysiological -- no miniature microscope, calcium imaging, or in vivo fluorescence
    imaging is described. The citation to Cai et al. 2016 (the seed paper) references
    memory allocation/engram concepts, not the UCLA Miniscope tool. No mention of
    "miniscope", "miniature microscope", "open-source miniscope", "calcium imaging",
    or any Miniscope variant (v4, MiniLFOV, MiniXL) appears in the paper. External
    API tools (Bash/curl, WebFetch, WebSearch, PubMed MCP) were unavailable during
    analysis; determination is based on agent knowledge of the paper. Confidence set
    to 0.85 rather than higher because BibTeX could not be fetched and full text could
    not be programmatically verified, but the paper's methods (c-Fos, DREADD, electrophysiology)
    are well-established as non-Miniscope techniques.
