  evidence:
  - type: abstract
    text: 'Abstract: "this status report reviews an extensive and diverse toolkit to
      explore brain function that have emerged from BRAIN related large-scale efforts
      of measurement and manipulation of structure and function"'
    assessment: Paper is a multi-author review/status report that catalogs neurophotonic
      tools; does not describe using any specific tool in experiments.
  - type: citation_analysis
    text: 'Paper cites Miniscope-LFOV papers (10.1126/sciadv.adg3918 and 10.1101/2021.11.21.469394)
      and the Miniscope v4 seed paper (Shuman et al. 2019, 10.1038/s41593-019-0559-0),
      but as references in a review context.'
    assessment: Citing a tool paper in a review does not constitute using the tool.
  paper_type: review
  suggested_component: null
  suggested_technique: null
  reasoning: This is a large multi-author (70+) review/status report paper published
    in Neurophotonics that surveys neurophotonic tools for brain studies. The abstract
    explicitly states it "reviews an extensive and diverse toolkit" rather than reporting
    original experimental work. While it cites Miniscope-related papers (MiniLFOV
    and Miniscope v4), these are referenced as part of a broad survey, not as tools
    used in the authors' own experiments. No mention of miniscope or miniature microscope
    appears in the abstract. Full text was not accessible to confirm whether the Miniscope
    is discussed in detail, but the paper type (review/status report) means it would
    be describing rather than using the tools. Confidence capped below 0.5 due to
    abstract-only analysis.
