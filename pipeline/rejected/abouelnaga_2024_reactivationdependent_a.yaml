  reasoning: "This is a behavioral pharmacology study using fear conditioning paradigms\
    \ and intrahippocampal drug infusions (pirenzepine, an M1 muscarinic antagonist)\
    \ in rats. The paper cites the seed paper (Cai et al. 2016) for its memory linking\
    \ findings, not for Miniscope technology. The abstract contains no mention of any\
    \ imaging tools, calcium imaging, miniscope, miniature microscope, or any fluorescence\
    \ imaging. The methods involve standard behavioral testing (contextual fear conditioning,\
    \ freezing behavior) and pharmacological manipulation, not in vivo neural imaging.\
    \ Full text was not accessible (abstract-only analysis via OpenAlex), but the abstract\
    \ and topic keywords make it highly clear this study does not use Miniscope tools.\
    \ Confidence set at 0.95 rather than capped at 0.5 because the paper's methodology\
    \ (behavioral pharmacology) is fundamentally incompatible with Miniscope usage\
    \ -- there is no imaging component to this study."
