  reasoning: >-
    This paper studies hippocampal theta-gamma coupling and spike-field coherence
    following traumatic brain injury in rats using high-density laminar
    electrophysiology. The abstract explicitly states the method as "high-density
    laminar electrophysiology" which is electrode-based recording, not calcium
    imaging with a miniscope. There is no mention of Miniscope, miniature
    microscope, calcium imaging, open-source miniscope, MiniLFOV, MiniXL, or any
    related imaging tool in the abstract. The citation to Shuman et al. 2019 (seed
    paper) is likely for context about hippocampal oscillatory dynamics, not because
    the authors used a Miniscope tool. Full text could not be retrieved (only
    abstract available via bioRxiv API), but the abstract provides clear evidence
    that this is an electrophysiology study, not a calcium imaging study.
