  reasoning: "This paper studies reactivation-dependent fear memory transfer using
    contextual fear conditioning and M1 muscarinic receptor antagonism in dorsal hippocampus.
    The methods are purely behavioral (freezing observation) and pharmacological (cannula
    drug infusion). The abstract contains no mention of any Miniscope, miniature microscope,
    calcium imaging, or any imaging tool from the Miniscope project. The paper likely
    cites seed paper Cai et al. 2016 for its conceptual work on memory engrams, not
    for the Miniscope hardware. Confidence capped below 0.5 due to abstract-only analysis,
    but strong negative signal from methods description."
