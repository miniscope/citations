  - source: abstract
    text: "Following brief re-exposure to a previously fear conditioned context, male
      rats (n=8-10/group) were placed into a neutral context to evaluate the transfer
      of fear memory. We also infused the selective M1 receptor antagonist pirenzepine
      into the dorsal hippocampus prior to memory reactivation to try to block this
      effect."
