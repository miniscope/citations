  reasoning: >-
    This paper studies memory formation via electrophysiology in freely moving
    macaques (primates), recording neural ensemble activity from hippocampal regions.
    The abstract mentions cell assemblies, CA1 pyramidal cells, and sleep reactivation
    but makes no reference to any Miniscope, miniature microscope, or calcium imaging.
    The UCLA Miniscope is designed for mice/rats, not macaques. The citation to Cai et al.
    2016 is about memory linking concepts, not the Miniscope tool.
