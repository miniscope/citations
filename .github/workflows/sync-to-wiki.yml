name: Sync citations to wiki

on:
  push:
    branches: [main]
    paths:
      - "**.bib"
      - "scripts/**"
      - "config.json"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Normalize citation keys
        id: normalize
        run: |
          if ! python scripts/normalize_keys.py; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit normalized keys
        if: steps.normalize.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "*.bib"
          git commit -m "Normalize citation keys"
          git push

      - name: Convert BibTeX to wikitext
        run: python scripts/bib_to_wikitext.py

      - name: Push to wiki
        env:
          WIKI_API_URL: ${{ secrets.WIKI_API_URL }}
          WIKI_BOT_USERNAME: ${{ secrets.WIKI_BOT_USERNAME }}
          WIKI_BOT_PASSWORD: ${{ secrets.WIKI_BOT_PASSWORD }}
        run: python scripts/push_to_wiki.py
