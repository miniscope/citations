name: Sync citations to wiki

on:
  push:
    branches: [main]
    paths:
      - "**.bib"
      - "scripts/**"
      - "config.json"
  pull_request:
    paths:
      - "**.bib"
      - "scripts/**"
      - "config.json"
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Base ref for diff (e.g. a commit SHA before removals). Defaults to HEAD~1."
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Normalize citation keys
        id: normalize
        run: |
          OUTPUT=$(python scripts/normalize_keys.py 2>&1) || true
          CHANGED=$(echo "$OUTPUT" | grep -c ' -> ' || true)
          echo "count=$CHANGED" >> "$GITHUB_OUTPUT"
          if [ "$CHANGED" -gt 0 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          echo "$OUTPUT"

      - name: Commit normalized keys
        id: commit
        if: steps.normalize.outputs.changed == 'true'
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "*.bib"
          git commit -m "Normalize citation keys"
          git push

      - name: Re-trigger checks on new commit
        if: steps.normalize.outputs.changed == 'true' && steps.commit.outcome == 'success' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW_SHA=$(git rev-parse HEAD)
          gh api "repos/${{ github.repository }}/check-runs" \
            -f name="validate" \
            -f head_sha="$NEW_SHA" \
            -f status="queued" \
            -f output='{"title":"Re-running after key normalization","summary":"Keys were normalized, re-triggering validation."}' || true
          # Also request check suite to re-run
          SUITE_IDS=$(gh api "repos/${{ github.repository }}/commits/${NEW_SHA}/check-suites" --jq '.check_suites[].id' 2>/dev/null || true)
          for SID in $SUITE_IDS; do
            gh api -X POST "repos/${{ github.repository }}/check-suites/${SID}/rerequest" 2>/dev/null || true
          done

      - name: Warn about non-standard keys
        if: steps.normalize.outputs.changed == 'true' && steps.commit.outcome == 'failure'
        run: |
          echo "::warning::Citation keys don't match the expected format (author_year_firstword). Run 'python scripts/normalize_keys.py' locally to fix, or a maintainer will normalize after merge."

      - name: Check for duplicates
        id: duplicates
        continue-on-error: true
        run: |
          OUTPUT=$(python scripts/check_duplicates.py 2>&1) || true
          echo "$OUTPUT"
          # Use ||| as delimiter for multi-line warnings
          DUPES=$(echo "$OUTPUT" | grep -A2 '⚠' | tr '\n' '|' | sed 's/|||$//' || true)
          echo "warnings=$DUPES" >> "$GITHUB_OUTPUT"
          python scripts/check_duplicates.py

      - name: Generate PR summary
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: "origin/${{ github.base_ref }}"
          KEYS_NORMALIZED: ${{ steps.normalize.outputs.count }}
          DUPLICATES: ${{ steps.duplicates.outputs.warnings }}
        run: python scripts/pr_summary.py

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -f output/pr_summary.md ]; then
            # Delete previous bot comment if any
            COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" --jq '.[] | select(.user.login == "github-actions[bot]") | select(.body | startswith("## Citations Summary")) | .id' | head -1)
            if [ -n "$COMMENT_ID" ]; then
              gh api -X DELETE "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}"
            fi
            gh pr comment "$PR_NUMBER" --body-file output/pr_summary.md
          fi

  sync:
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: ${{ inputs.base_ref && '0' || '2' }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Convert changed citations to wikitext
        env:
          BASE_REF: ${{ inputs.base_ref || 'HEAD~1' }}
        run: python scripts/bib_to_wikitext.py --changed-only

      - name: Push to wiki
        env:
          WIKI_API_URL: ${{ secrets.WIKI_API_URL }}
          WIKI_BOT_USERNAME: ${{ secrets.WIKI_BOT_USERNAME }}
          WIKI_BOT_PASSWORD: ${{ secrets.WIKI_BOT_PASSWORD }}
        run: python scripts/push_to_wiki.py
